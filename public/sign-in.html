<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your NutriTrack account — India's smart calorie and nutrition tracker. Start your health journey today.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./images/speedometer.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <title>Sign Up · NutriTrack</title>
  <link rel="stylesheet" href="log-sign.css">
</head>
<body>

  <!-- Background orb element -->
  <div class="bg-orb" aria-hidden="true"></div>

  <!-- Toast container for notifications -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <main class="auth-container">
    <div class="auth-card">

      <!-- Header -->
      <header class="auth-header">
        <div class="auth-logo" aria-hidden="true">
          <!-- Flame / leaf icon -->
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.5 6 4 10.5 4 14a8 8 0 0 0 16 0c0-3.5-2.5-8-8-12Z"/>
            <path d="M12 22c-2.2 0-4-1.8-4-4 0-2 1.5-4.5 4-7 2.5 2.5 4 5 4 7 0 2.2-1.8 4-4 4Z" style="opacity: 0.6"/>
          </svg>
        </div>
        <h1>Create your account</h1>
        <p>Start tracking your nutrition journey</p>
      </header>

      <!-- Google Sign-Up -->
      <button type="button" class="social-btn" id="btn-google-signup">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or sign up with email</span>
      </div>

      <!-- Registration Form -->
      <form class="auth-form" id="signup-form" novalidate>

        <!-- Full Name -->
        <div class="input-group" id="group-name">
          <input type="text" id="signup-name" placeholder="Full Name" required autocomplete="name">
          <label for="signup-name">Full Name</label>
          <p class="input-error" id="error-name">Please enter your name</p>
        </div>

        <!-- Email -->
        <div class="input-group" id="group-email">
          <input type="email" id="signup-email" placeholder="Email Address" required autocomplete="email">
          <label for="signup-email">Email Address</label>
          <p class="input-error" id="error-email">Please enter a valid email address</p>
        </div>

        <!-- Password -->
        <div class="input-group" id="group-password">
          <div class="password-wrapper">
            <input type="password" id="signup-password" placeholder="Password" required autocomplete="new-password" minlength="8">
            <label for="signup-password">Password</label>
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Show password">
              <!-- Eye icon -->
              <svg id="eye-icon" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hidden by default) -->
              <svg id="eye-off-icon" viewBox="0 0 24 24" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <p class="input-error" id="error-password">Password must be at least 8 characters</p>
          <!-- Strength meter -->
          <div class="password-strength" id="password-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <p class="strength-label" id="strength-label"></p>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="input-group" id="group-confirm">
          <div class="password-wrapper">
            <input type="password" id="signup-confirm" placeholder="Confirm Password" required autocomplete="new-password">
            <label for="signup-confirm">Confirm Password</label>
            <button type="button" class="password-toggle" id="toggle-confirm" aria-label="Show password">
              <svg viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="input-error" id="error-confirm">Passwords do not match</p>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="btn-signup">
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>

      </form>

      <!-- Footer link -->
      <div class="auth-footer">
        <p>Already have an account? <a href="./login.html">Log in</a></p>
      </div>

    </div>

    <p class="auth-copyright">© 2025–2026 NutriTrack. All rights reserved.</p>
  </main>

  <!-- Registration Logic -->
  <script type="module" src="sign-in.js"></script>

</body>
</html>
